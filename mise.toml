[tools]
aube = "latest"
"npm:@fission-ai/openspec" = "latest"
python = "3.13"

[tasks.serve]
description = "Serve the playable game locally on a dynamic port (URL printed to stdout)"
run = "node scripts/serve-local.mjs"

[tasks.playwright-install]
description = "Install Playwright browser binaries required by smoke tests"
run = "npx playwright install --with-deps"
